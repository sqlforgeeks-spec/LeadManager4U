{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in — LeadManager4U.ai</title>
  <script>
    (() => {
      try {
        const saved = localStorage.getItem("lm4u_theme");
        const initial = saved === "dark" || saved === "light"
          ? saved
          : (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
        document.documentElement.dataset.theme = initial;
      } catch {}
    })();
  </script>
  <link rel="stylesheet" href="{% static 'scraper/styles.css' %}">
</head>
<body class="login-page">
  <button class="theme-toggle login-theme-toggle" id="theme-toggle" type="button"
          onclick="toggleTheme()" aria-label="Switch to dark mode" title="Switch to dark mode">
    <span class="theme-toggle-icon" aria-hidden="true">☾</span>
    <span class="theme-toggle-label">Dark mode</span>
  </button>
  <main class="login-card">
    <div class="login-brand-mark">LM</div>
    <div class="login-brand">LeadManager4U<span>.ai</span></div>
    <p class="login-subtitle">Sign in to manage your leads and outreach.</p>
    {% if form.errors %}
      <div class="alert alert-error">Your username or password was not recognised.</div>
    {% endif %}
    <form method="post" class="login-form">
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ next }}">
      <label class="form-label" for="id_username">Username</label>
      <input class="form-input" id="id_username" name="username" type="text" autocomplete="username" autofocus required>
      <label class="form-label" for="id_password">Password</label>
      <input class="form-input" id="id_password" name="password" type="password" autocomplete="current-password" required>
      <button class="btn btn-primary btn-lg" type="submit">Sign in</button>
    </form>
  </main>
  <script>
    function applyTheme(theme) {
      const isDark = theme === "dark";
      document.documentElement.dataset.theme = isDark ? "dark" : "light";
      try { localStorage.setItem("lm4u_theme", isDark ? "dark" : "light"); } catch {}
      const button = document.getElementById("theme-toggle");
      if (!button) return;
      button.setAttribute("aria-label", isDark ? "Switch to light mode" : "Switch to dark mode");
      button.setAttribute("title", isDark ? "Switch to light mode" : "Switch to dark mode");
      button.querySelector(".theme-toggle-icon").textContent = isDark ? "☀" : "☾";
      button.querySelector(".theme-toggle-label").textContent = isDark ? "Light mode" : "Dark mode";
    }
    function toggleTheme() {
      applyTheme(document.documentElement.dataset.theme === "dark" ? "light" : "dark");
    }
    applyTheme(document.documentElement.dataset.theme === "dark" ? "dark" : "light");
  </script>
</body>
</html>
